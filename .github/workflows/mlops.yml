name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**'
      - 'src/**'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Viet lenh de chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2: Ghi noi dung credentials va set bien moi truong xac thuc AWS.
        #         CLOUD_CREDENTIALS la JSON: {"aws_access_key_id":"...","aws_secret_access_key":"..."}
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/aws-creds.json
          AKID=$(python -c "import json;print(json.load(open('/tmp/aws-creds.json'))['aws_access_key_id'])")
          ASAK=$(python -c "import json;print(json.load(open('/tmp/aws-creds.json'))['aws_secret_access_key'])")
          echo "::add-mask::$AKID"
          echo "::add-mask::$ASAK"
          echo "AWS_ACCESS_KEY_ID=$AKID" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$ASAK" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          rm -f /tmp/aws-creds.json

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu cloud storage bang lenh dvc pull.
        #         Chi pull train_phase1.csv va eval.csv (khong can train_phase2.csv).
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json bang Python inline.
        #         Set ket qua thanh output "accuracy" de job deploy co the doc.
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
          echo "Accuracy doc duoc: $ACC"

      - name: Upload model to Cloud Storage
        # TODO 5: Upload models/model.pkl len s3://<bucket>/models/latest/model.pkl
        #         Ten bucket lay tu secret CLOUD_BUCKET.
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          import boto3

          bucket_name = os.environ["CLOUD_BUCKET"]
          s3 = boto3.client("s3")
          s3.upload_file("models/model.pkl", bucket_name, "models/latest/model.pkl")
          print(f"Da upload model len s3://{bucket_name}/models/latest/model.pkl")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.65).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 6: Doc accuracy tu output cua job train.
        #         Neu accuracy < 0.65, ket thuc voi loi ro rang.
        #         Neu dat nguong, in thong bao va tiep tuc.
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          if acc < 0.65:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < 0.65. Huy deploy.")
          print(f"PASSED: accuracy {acc:.4f} >= 0.65. Dang trien khai model.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # TODO 7: Restart service mlops-serve tren VM.
            sudo systemctl restart mlops-serve

            # TODO 8: Cho server san sang roi goi curl /health de xac nhan.
            #         Neu health check that bai sau nhieu lan thu, thoat voi exit 1.
            sleep 5
            for i in 1 2 3 4 5; do
              if curl -sf http://localhost:8000/health; then
                echo ""
                echo "Health check passed (lan thu $i)."
                exit 0
              fi
              echo "Cho server khoi dong... (lan thu $i)"
              sleep 3
            done
            echo "Health check that bai sau 5 lan thu."
            exit 1
